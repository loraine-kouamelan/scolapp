name: CI/CD Application PHP

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: self-hosted
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Vérification de PHP
        run: C:\wamp64\bin\php\php8.0.30\php.exe -v

      - name: Installation des dépendances
        run: composer install

      - name: Lancement des tests unitaires
        run: vendor\bin\phpunit --testdox

      - name: Vérification du style de code
        run: vendor\bin\phpcs --standard=PSR12 src

  deploy:
    needs: build-test
    runs-on: self-hosted
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Déploiement vers WAMP
        run: |
          echo "Déploiement en cours..."
          xcopy /E /I /Y * "C:\wamp64\www\memoire\"
          echo "Fichiers copiés"

      - name: Fin
        run: echo "Déploiement terminé"
