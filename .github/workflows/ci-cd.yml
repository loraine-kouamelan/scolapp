name: CI/CD Application PHP

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: self-hosted

    steps:
      # 1. Récupération du code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Vérification PHP
      - name: Check PHP version
        run: php -v

      # 3. Installation dépendances Composer
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      # 4. Lancement des tests PHPUnit
      - name: Run unit tests
        run: vendor/bin/phpunit tests --testdox

      # 5. Auto-correction style PSR-12
      - name: Fix code style (PHPCBF)
        run: vendor/bin/phpcbf --standard=PSR12 --ignore=vendor .

      # 6. Vérification style PSR-12 (quality gate)
      - name: Check code style (PHPCS)
        run: vendor/bin/phpcs --standard=PSR12 --ignore=vendor .

  deploy:
    needs: build-test
    runs-on: self-hosted

    steps:
      # 1. Récupération du code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Déploiement vers WAMP
      - name: Deploy to WAMP
        run: |
          echo "Déploiement en cours..."
          robocopy . C:\wamp64\www\memoire /MIR /XD .git vendor tests
          echo "Déploiement terminé"

      # 3. Fin
      - name: Finish
        run: echo "CI/CD terminé avec succès"