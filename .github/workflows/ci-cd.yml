name: CI/CD Application PHP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: self-hosted

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Vérification PHP
        run: php -v

      - name: Installation dépendances
        run: composer install --no-interaction --prefer-dist

      - name: Lancement tests
        run: vendor/bin/phpunit tests --testdox

      - name: Correction style code (PHPCBF)
        run: vendor/bin/phpcbf --standard=PSR12 --ignore=vendor . || true

      - name: Vérification style code (PHPCS)
        run: vendor/bin/phpcs --standard=PSR12 --ignore=vendor . || true

  deploy:
    needs: build-test
    runs-on: self-hosted

    steps:
      - name: Déploiement WAMP
        run: |
          echo "Déploiement..."
          robocopy . C:\wamp64\www\memoire /MIR /XD .git vendor tests
          echo "Terminé"