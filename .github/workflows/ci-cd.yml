name: CI/CD Application PHP

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: self-hosted

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Vérification PHP
        run: php -v

      - name: Vérification Composer
        run: C:\Users\LEGION\composer\composer.bat -V

      - name: Installation des dépendances
        run: C:\Users\LEGION\composer\composer.bat install --no-interaction --prefer-dist

      - name: Vérification dossier vendor
        run: dir vendor

      - name: Lancement des tests unitaires
        run: vendor\bin\phpunit --testdox

      - name: Vérification du style de code
        run: vendor\bin\phpcs --standard=PSR12 src

  deploy:
    needs: build-test
    runs-on: self-hosted

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Déploiement vers WAMP
        run: |
          echo "Déploiement en cours..."
          robocopy . C:\wamp64\www\memoire /MIR /XD .git vendor tests .github
          echo "Déploiement terminé"

      - name: Fin
        run: echo "Pipeline CI/CD terminé avec succès"