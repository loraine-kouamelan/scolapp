name: CI/CD Application PHP

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: self-hosted

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Vérification de PHP
        run: php -v

      - name: Installation des dépendances
        run: composer install --no-interaction --prefer-dist

      - name: Lancement des tests unitaires
        run: vendor\bin\phpunit.bat tests --testdox

      - name: Vérification du style de code
        run: vendor\bin\phpcs.bat --standard=PSR12 --ignore=vendor .

  deploy:
    needs: build-test
    runs-on: self-hosted

    steps:
      - name: Déploiement vers WAMP
        run: |
          echo "Déploiement en cours..."
          robocopy . C:\wamp64\www\memoire /MIR /XD .git vendor tests
          echo "Déploiement terminé"